name: Update BMW X3 valuation data

on:
  schedule:
    # Daily at 02:00 UTC (10:00 SGT) — after overnight listing refreshes
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape sgCarMart and write data.json
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
